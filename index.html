<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Year 🎓</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:"Poppins",sans-serif;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
overflow:hidden;
color:#333;
text-align:center;
background:#f2f2f2; /* simple background */
}

h2{
font-size:2.5rem;
margin-bottom:40px;
}

.year-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
}

.year-btn{
background:#ffffff;
color:#333;
padding:20px 40px;
border-radius:20px;
text-decoration:none;
font-size:1.2rem;
font-weight:600;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
transition:all 0.3s ease;
cursor:pointer;
}

.year-btn:hover{
transform:scale(1.1);
box-shadow:0 10px 35px rgba(0,0,0,0.3);
}

.emoji{
font-size:26px;
margin-right:10px;
}

footer{
margin-top:60px;
font-size:14px;
color:#555;
}

.float{
position:absolute;
opacity:0.4;
animation:float 6s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-20px);}
}

.wave{
display:none; /* wave removed */
}

</style>
</head>

<body>

<div class="float" style="top:10%; left:15%;">📚</div>
<div class="float" style="top:25%; right:10%;">🎓</div>
<div class="float" style="bottom:15%; left:10%;">💡</div>
<div class="float" style="bottom:20%; right:20%;">🚀</div>

<h2>🎉 Select Your Year of Study 🎉</h2>

<div class="year-container">

<div class="year-btn" onclick="selectYear(1)">
🌱 1st Year
</div>

<div class="year-btn" onclick="selectYear(2)">
📘 2nd Year
</div>

<div class="year-btn" onclick="selectYear(3)">
💡 3rd Year
</div>

<div class="year-btn" onclick="selectYear(4)">
🚀 4th Year
</div>

</div>

<footer>©️ 2025 Student Hub | Made with 💖</footer>

<script>

function selectYear(year){
localStorage.setItem("year",year);
window.location.href="https://npulapa.github.io/subjexts-page/";
}

</script>

</body>
</html>
