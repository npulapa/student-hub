<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Subject ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

body{
font-family:'Inter',sans-serif;
margin:0;
height:100vh;
overflow-x:hidden;
background:linear-gradient(120deg,#1e3c72,#2a5298,#6dd5fa);
background-size:400% 400%;
animation:gradientFlow 10s ease infinite;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
color:#fff;
text-align:center;
position:relative;
}

@keyframes gradientFlow{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h2{
font-size:2.2rem;
margin-top:60px;
text-shadow:0 3px 8px rgba(0,0,0,0.3);
letter-spacing:1px;
}

.subject{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(8px);
border-radius:20px;
padding:20px 30px;
margin:15px auto;
width:320px;
color:#fff;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
transition:all 0.3s ease;
cursor:pointer;
}

.subject:hover{
transform:translateY(-5px) scale(1.05);
background:rgba(255,255,255,0.25);
}

.subject strong{
display:block;
font-size:1.3rem;
}

.subject small{
font-size:0.9rem;
opacity:0.9;
}

.quiz{
margin-top:25px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
border-radius:25px;
padding:20px 30px;
width:320px;
color:#fff;
font-weight:600;
box-shadow:0 0 20px rgba(0,183,255,0.6);
cursor:pointer;
transition:0.3s ease;
}

.quiz:hover{
transform:scale(1.08);
}

.particle{
position:absolute;
width:6px;
height:6px;
background:rgba(255,255,255,0.5);
border-radius:50%;
animation:floatUp 8s linear infinite;
}

@keyframes floatUp{
0%{transform:translateY(100vh) scale(0.5);opacity:0;}
30%{opacity:1;}
100%{transform:translateY(-10vh) scale(1.2);opacity:0;}
}

footer{
position:absolute;
bottom:15px;
font-size:14px;
color:rgba(255,255,255,0.8);
}
</style>
</head>

<body>

<h2 id="yearTitle">🎓 Select Your Subject</h2>

<div id="subjectList"></div>

<!-- QUIZ BUTTON -->
<div class="quiz" onclick="window.location.href='https://npulapa.github.io/quiz-app/'">
🧠 Take a Quiz
</div>

<footer>©️ 2025 Student Resource Hub</footer>

<script>

const subjectsByYear = {

1:[
{name:"LINEAR ALGEBRA AND DIFFERENTIAL EQUATIONS",code:"2400BS01"},
{name:"PROGRAMMING FOR PROBLEM SOLVING",code:"2405ES01"},
{name:"BASIC ELECTRICAL & ELECTRONICS ENGINEERING",code:"2402ES01"},
{name:"APPLIED PHYSICS",code:"2400BS05"}
],

2:[
{name:"DATABASE MANAGEMENT SYSTEMS",code:"2405PC08"},
{name:"OBJECT ORIENTED PROGRAMMING THROUGH JAVA",code:"2405PC04"},
{name:"OPERATING SYSTEMS",code:"2405PC02"}
],

3:[
{name:"Database Systems",code:"CSE301"},
{name:"Operating Systems",code:"CSE302"},
{name:"Computer Networks",code:"CSE303"}
],

4:[
{name:"AI & ML",code:"CSE401"},
{name:"Cloud Computing",code:"CSE402"},
{name:"Cyber Security",code:"CSE403"}
]

};

const year = localStorage.getItem('year') || 1;

document.getElementById('yearTitle').innerText = `📘 Subjects for Year ${year}`;

const list = document.getElementById('subjectList');

subjectsByYear[year].forEach(sub=>{

const div=document.createElement('div');
div.className='subject';

div.innerHTML=`<strong>${sub.name}</strong><small>Code: ${sub.code}</small>`;

div.onclick=()=>{
localStorage.setItem('subject',sub.name);
window.location.href="https://npulapa.github.io/materials-site/";
};

list.appendChild(div);

});

function createParticles(){
for(let i=0;i<25;i++){
const p=document.createElement('div');
p.classList.add('particle');
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=6+Math.random()*5+"s";
document.body.appendChild(p);
}
}

createParticles();

</script>

</body>
</html>
